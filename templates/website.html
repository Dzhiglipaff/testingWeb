<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <meta name="author" content="Group">
    <title>Dragon Bites</title>
    <link href="{{ url_for('static', filename='website.css') }}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
</head>

<body>
    <header><!--banner image is set behnd the header in css-->
        <aside class="head-above">
    </header>
    <nav>
        <ul>
            <li><a href="#">Free events</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="#">Meal Mapper</a></li>
            <li><a href="/listing">Restaurants</a></li>
        </ul>
    </nav>
    <h3 align="center">Affordable, free and campus approved food spots for Drexel Students</h3>
    <div class="main-wrapper">
        <div class="content-area">
            <h2>Food listing</h2>
            {% for restaurant in restaurants %}
            <p>{{ restaurant[0] }}</p>
            {% endfor %}
            <div class="map-box">
            </div>
        </div>
        <div id="banner">
            <div id="map" style="width: 100%; height: 100%; min-height: 400px; z-index: 1;"></div>
        </div>
        <aside class="filter-sidebar">
            <h3><b>FILTERS:</b></h3>
            <hr>
            <div id="filters-container">
                <form id="filters-form" style="display:inline;">
                    <label><input type="checkbox" name="filter" value="dragonDollars" {% if 'dragonDollars' in
                            active_filters %}checked{% endif %}> Dragon Dollars</label><br>
                    <label><input type="checkbox" name="filter" value="diningDollars" {% if 'diningDollars' in
                            active_filters %}checked{% endif %}> Dining dollars</label><br>
                    <label><input type="checkbox" name="filter" value="card" {% if 'card' in active_filters %}checked{%
                            endif %}> Card</label><br>
                    <label><input type="checkbox" name="filter" value="cash" {% if 'cash' in active_filters %}checked{%
                            endif %}> Cash</label><br>
                </form>
            </div>
            <hr>
            <h3><b>Price</b></h3>
            <input type="number" id="min-price" placeholder="Min $" min="0">
            <input type="number" id="max-price" placeholder="Max $" min="0">
            <button class="apply-btn">Apply</button>
        </aside>




        <script src="{{ url_for('static', filename='filters.js') }}"></script>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
        <script src="{{ url_for('static', filename='map.js') }}"></script>

    </div>
</body>

</html>
